{% extends 'base.html' %}

{% block content %}
<div class="hero-section text-center py-5 bg-dark text-white mb-5" style="background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.pexels.com/photos/1242348/pexels-photo-1242348.jpeg?auto=compress&cs=tinysrgb&w=1260&h=750&dpr=1'); background-size: cover; background-position: center;">
    <div class="container py-5">
        <h1 class="display-3 fw-bold">Explore Stunning HD Wallpapers</h1>
        <p class="lead mb-4">High quality images curated from top photographers.</p>
        <div class="d-flex justify-content-center flex-wrap">
            {% for cat in categories %}
                <a href="{% url 'search' %}?q={{ cat.slug }}" class="btn btn-outline-light rounded-pill m-1">{{ cat.name }}</a>
            {% endfor %}
        </div>
    </div>
</div>

<div class="container">
    <h3 class="mb-4 fw-bold"><i class="bi bi-stars text-warning"></i> Curated for You</h3>
    <div class="masonry-grid">
        {% for photo in curated %}
        <div class="wallpaper-card position-relative rounded-4 overflow-hidden shadow-sm">
            <img src="{{ photo.src.large2x }}" class="w-100 rounded-4" alt="{{ photo.alt }}">
            <div class="overlay position-absolute bottom-0 start-0 w-100 p-3 d-flex justify-content-between align-items-center">
                <span class="text-white small fw-bold">{{ photo.photographer }}</span>
                <div class="d-flex gap-2">
                    <button onclick="openDownloadModal('{{ photo.src.original }}', '{{ photo.alt }}')" class="btn btn-light btn-sm rounded-circle">
                        <i class="bi bi-download"></i>
                    </button>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
